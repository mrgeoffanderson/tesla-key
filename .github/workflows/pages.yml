name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare files
        run: |
          mkdir -p _site/.well-known/appspecific
          cp .well-known/appspecific/com.tesla.3p.public-key.pem _site/.well-known/appspecific/com.tesla.3p.public-key.pem
          cp index.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - uses: actions/deploy-pages@v5
        id: deployment
